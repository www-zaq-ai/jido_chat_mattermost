name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint
    uses: agentjido/github-actions/.github/workflows/elixir-lint.yml@v3
    with:
      otp_version: "27.3"
      elixir_version: "1.18.4"
      validate_hex_package: false

  test:
    name: Test
    uses: agentjido/github-actions/.github/workflows/elixir-test.yml@v3
    with:
      otp_versions: '["27.3"]'
      elixir_versions: '["1.18.4"]'
      test_command: mix test

  coverage:
    name: Coverage
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Set up Elixir
        uses: erlef/setup-beam@v1
        with:
          otp-version: "27.3"
          elixir-version: "1.18.4"

      - name: Restore cached deps
        uses: actions/cache@v5
        with:
          path: |
            deps
            _build
          key: ${{ runner.os }}-coverage-${{ hashFiles('mix.lock') }}
          restore-keys: |
            ${{ runner.os }}-coverage-

      - name: Install Hex/Rebar
        run: |
          set -euo pipefail
          mix local.hex --force
          mix local.rebar --force

      - name: Install dependencies
        run: mix deps.get

      - name: Run coverage
        run: mix coveralls

      - name: Upload coverage
        uses: codecov/codecov-action@v5
        with:
          files: ./cover/excoveralls.json
